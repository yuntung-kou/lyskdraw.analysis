<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀與深空 | 抽卡紀錄分析器</title>
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --primary: #6366f1;
            --primary-hover: #4f46e5; --text-main: #1e293b; --text-sub: #64748b;
            --border: #cbd5e1; --oshi-color: #ec4899; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        /* 統一的區塊外觀 (對應你的手繪圖) */
        .block { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 2px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: #1e40af; margin: 0; font-size: 22px; }
        h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #1d4ed8; border-bottom: 2px solid #bfdbfe; padding-bottom: 5px;}
        
        /* 表單元素 */
        .form-group { margin-bottom: 15px; }
        label.group-label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; color: #334155; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input::-webkit-calendar-picker-indicator { display: none !important; }
        
        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
        .radio-label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 14px; background: #f1f5f9; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); transition: 0.2s;}
        .radio-label:hover { border-color: var(--primary); background: #e0e7ff; }
        input[type="radio"], input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

        .btn-submit { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px;}
        .btn-submit:hover { background-color: var(--primary-hover); }

        /* 統計區塊 */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 10px; border-radius: 6px; text-align: center; }
        .stat-box h5 { margin: 0 0 5px 0; font-size: 12px; color: var(--text-sub); }
        .stat-box-bad { background: #fef2f2; border-color: #fecaca; }
        
        /* 稱號顏色設定 */
        .title-god { color: #16a34a; font-weight: bold; } /* 天選之子 */
        .title-lucky { color: #4ade80; } /* 幸運兒 */
        .title-plain { color: #ca8a04; } /* 平凡人 */
        .title-unlucky { color: #ea580c; } /* 小不幸運 */
        .title-bad { color: #dc2626; font-weight: bold;} /* 小倒霉鬼 */

        /* 長條圖 */
        .chart-container { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding: 25px 5px 5px 5px; overflow-x: auto; background-color: #f8fafc; border-radius: 6px; border: 1px solid var(--border); }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-width: 40px; height: 100%; }
        .wai-circle { width: 18px; height: 18px; border-radius: 50%; color: white; font-size: 8px; display: flex; justify-content: center; align-items: center; margin-bottom: 4px; font-weight: bold; }
        .circle-target { background: #8b5cf6; } .circle-wai { background: #64748b; } .circle-oshi { background: var(--oshi-color); }
        .bar-value { font-size: 11px; font-weight: bold; color: #334155; margin-bottom: 4px; }
        .bar-fill { width: 25px; border-radius: 4px 4px 0 0; }
        .bar-label { font-size: 9px; color: var(--text-sub); margin-top: 6px; max-width: 40px; overflow: hidden; text-align: center; white-space: nowrap;}

        /* 歷史紀錄 */
        .record-card { background-color: #f8fafc; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .record-info h4 { margin: 0 0 6px 0; font-size: 14px; color: #1e293b;} 
        .record-info p { margin: 0; font-size: 12px; color: var(--text-sub); }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; color: white; margin-right: 5px;}
        .tag-target { background: #8b5cf6; } .tag-wai { background: #64748b; } .tag-oshi { background: var(--oshi-color); }
        .del-btn { background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div class="block">
        <h1>📊 戀與深空抽卡紀錄分析器</h1>
    </div>

    <div class="block">
        <h3>💖 選自推 (可隨時更改)</h3>
        <div class="radio-group" id="oshiGroup">
            <label class="radio-label"><input type="checkbox" name="oshi" value="祁煜" onchange="saveOshis()"> 🐟 祁煜</label>
            <label class="radio-label"><input type="checkbox" name="oshi" value="沈星回" onchange="saveOshis()"> 🌟 沈星回</label>
            <label class="radio-label"><input type="checkbox" name="oshi" value="黎深" onchange="saveOshis()"> 🍐 黎深</label>
            <label class="radio-label"><input type="checkbox" name="oshi" value="秦徹" onchange="saveOshis()"> 🚘 秦徹</label>
            <label class="radio-label"><input type="checkbox" name="oshi" value="夏以晝" onchange="saveOshis()"> 🍎 夏以晝</label>
        </div>
    </div>

    <div class="block">
        <h3>📝 新增紀錄</h3>
        <div class="form-group">
            <label class="group-label">1. 卡池名稱 (自動帶入卡池資訊)</label>
            <input type="text" id="bannerName" placeholder="請輸入或選擇卡池名稱..." list="bannerList" onchange="autoFillBannerInfo()">
            <datalist id="bannerList"></datalist>
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label class="group-label">2. 卡池種類 (大類)</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="mainPool" value="限定" checked> 限定</label>
                    <label class="radio-label"><input type="radio" name="mainPool" value="復刻"> 復刻</label>
                </div>
            </div>
            <div style="flex: 1;">
                <label class="group-label">卡池種類 (細項)</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="subPool" value="單人" checked> 單人</label>
                    <label class="radio-label"><input type="radio" name="subPool" value="日卡"> 日卡</label>
                    <label class="radio-label"><input type="radio" name="subPool" value="混池"> 混池</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="group-label">3. 抽到的男主與卡名 (系統將自動判斷是否歪卡)</label>
            <div class="radio-group" style="margin-bottom: 8px;">
                <label class="radio-label"><input type="radio" name="pulledLead" value="祁煜" checked> 🐟 祁煜</label>
                <label class="radio-label"><input type="radio" name="pulledLead" value="沈星回"> 🌟 沈星回</label>
                <label class="radio-label"><input type="radio" name="pulledLead" value="黎深"> 🍐 黎深</label>
                <label class="radio-label"><input type="radio" name="pulledLead" value="秦徹"> 🚘 秦徹</label>
                <label class="radio-label"><input type="radio" name="pulledLead" value="夏以晝"> 🍎 夏以晝</label>
            </div>
            <input type="text" id="cardName" placeholder="請輸入思念名稱 (選填)">
        </div>

        <div class="form-group">
            <label class="group-label">4. 花費抽數 (出金當下的抽數 1~70)</label>
            <input type="number" id="pulls" placeholder="例如：65" min="1" max="70">
        </div>
        
        <button class="btn-submit" onclick="addRecord()">存檔紀錄 💾</button>
    </div>

    <div class="block">
        <h3>📈 運氣與體質看板</h3>
        <div class="stats-grid">
            <div class="stat-box" id="luckLim"><h5>💠 限時池運氣</h5>---</div>
            <div class="stat-box" id="luckRe"><h5>🔄 復刻池運氣</h5>---</div>
            <div class="stat-box stat-box-bad" id="bestBanner"><h5>🏆 最歐卡池</h5>---</div>
            <div class="stat-box stat-box-bad" id="worstSpook"><h5>💔 最常歪誰</h5>---</div>
        </div>
    </div>

    <div class="block">
        <h3>📊 抽卡歷程圖</h3>
        <div id="chartContainer" class="chart-container"></div>
    </div>

    <div class="block">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #bfdbfe; padding-bottom: 5px; margin-bottom: 15px;">
            <h3 style="margin: 0; border: none; padding: 0;">📜 歷史資料</h3>
            <button onclick="clearAll()" style="background:none; border:none; color:#ef4444; font-size:12px; cursor:pointer; font-weight:bold;">[清空資料]</button>
        </div>
        <div id="recordList"></div>
    </div>
</div>

<script src="love_and_deepspace_events.js"></script>

<script>
    const leadIcons = {'祁煜':'🐟', '沈星回':'🌟', '黎深':'🍐', '秦徹':'🚘', '夏以晝':'🍎'};

    // 1. 初始化資料庫至下拉選單
    function initEventData() {
        if (typeof eventCards === 'undefined') return alert("找不到資料庫！請確認 love_and_deepspace_events.js 檔案存在。");
        const datalist = document.getElementById('bannerList');
        const uniqueBanners = [...new Set(eventCards.map(e => e.eventName))];
        uniqueBanners.forEach(banner => {
            const option = document.createElement('option');
            option.value = banner;
            datalist.appendChild(option);
        });
    }

    // 2. 自動帶入卡池資訊 (當選擇卡池名稱時)
    function autoFillBannerInfo() {
        const bannerName = document.getElementById('bannerName').value;
        const event = eventCards.find(e => e.eventName === bannerName);
        if (event) {
            // 自動判斷大類 (如果名稱有復刻，或是使用者自己判斷，這邊做個簡單處理)
            if(event.poolType.includes('復刻')) {
                document.querySelector('input[name="mainPool"][value="復刻"]').checked = true;
            } else {
                document.querySelector('input[name="mainPool"][value="限定"]').checked = true;
            }

            // 自動判斷細項
            if(event.poolType.includes('混池')) document.querySelector('input[name="subPool"][value="混池"]').checked = true;
            else if(event.poolType.includes('日卡')) document.querySelector('input[name="subPool"][value="日卡"]').checked = true;
            else document.querySelector('input[name="subPool"][value="單人"]').checked = true;
        }
    }

    // 3. 自推存取
    function saveOshis() {
        const oshis = Array.from(document.querySelectorAll('input[name="oshi"]:checked')).map(cb => cb.value);
        localStorage.setItem('oshis', JSON.stringify(oshis));
        renderUI();
    }

    function loadOshis() {
        const oshis = JSON.parse(localStorage.getItem('oshis')) || [];
        document.querySelectorAll('input[name="oshi"]').forEach(cb => cb.checked = oshis.includes(cb.value));
    }

    // 4. 新版評分系統 (採用自訂的五個分類)
    const judgeS = (p) => {
        if (p <= 7) return {t:"天選之子", c:"#16a34a", s:2};
        if (p <= 24) return {t:"幸運兒", c:"#4ade80", s:1};
        if (p <= 35) return {t:"平凡人", c:"#ca8a04", s:0};
        if (p <= 45) return {t:"小不幸運", c:"#ea580c", s:-1};
        return {t:"小倒霉鬼", c:"#dc2626", s:-2};
    };

    // 歪卡後大保底的評分
    const judgeT = (p) => {
        if (p <= 26) return {t:"天選之子", c:"#16a34a", s:2}; 
        if (p <= 65) return {t:"幸運兒", c:"#4ade80", s:1};
        if (p <= 85) return {t:"平凡人", c:"#ca8a04", s:0};
        if (p <= 110) return {t:"小不幸運", c:"#ea580c", s:-1};
        return {t:"小倒霉鬼", c:"#dc2626", s:-2};
    };

    // 墊池變數管理
    const getP = (type) => parseInt(localStorage.getItem('p_' + type)) || 0;
    const setP = (type, v) => localStorage.setItem('p_' + type, v);

    // 5. 核心：新增紀錄與自動判斷歪卡
    function addRecord() {
        const banner = document.getElementById('bannerName').value.trim();
        const main = document.querySelector('input[name="mainPool"]:checked').value;
        const sub = document.querySelector('input[name="subPool"]:checked').value;
        const pulledLead = document.querySelector('input[name="pulledLead"]:checked').value;
        const card = document.getElementById('cardName').value.trim();
        const pulls = parseInt(document.getElementById('pulls').value);

        if (!banner) return alert("請輸入卡池名稱！");
        if (isNaN(pulls) || pulls < 1 || pulls > 70) return alert("請輸入正確的抽數 (1-70)！");

        const oshis = JSON.parse(localStorage.getItem('oshis')) || [];
        const event = typeof eventCards !== 'undefined' ? eventCards.find(e => e.eventName === banner) : null;
        
        let judgeResult = 'wai'; // 預設為歪
        
        // 核心判斷邏輯
        if (event && event.cards[pulledLead] && (!card || event.cards[pulledLead].includes(card))) {
            // 卡池中有這位男主，且卡名相符 (或沒填卡名但男主對了)，視為目標達成！
            judgeResult = 'target';
        } else if (oshis.includes(pulledLead)) {
            // 歪了，但是是自推！
            judgeResult = 'oshi_spook';
        }

        const poolKey = main === '限定' ? 'lim' : 're';
        let currentP = getP(poolKey);
        
        let rec = { id: Date.now(), main, sub, lead: pulledLead, banner, card, pulls, res: judgeResult };
        
        if (judgeResult === 'target') {
            rec.total = currentP + pulls; // 加上之前墊的
            rec.luck = judgeT(rec.total);
            setP(poolKey, 0); // 清空墊池
        } else {
            rec.total = pulls;
            rec.luck = judgeS(pulls);
            setP(poolKey, currentP + pulls); // 累加墊池
        }

        let db = JSON.parse(localStorage.getItem('db_v3')) || [];
        db.unshift(rec);
        localStorage.setItem('db_v3', JSON.stringify(db));
        
        // 清空表單
        document.getElementById('cardName').value = '';
        document.getElementById('pulls').value = '';
        renderUI();
    }

    function deleteRec(id) {
        if (confirm("確定刪除此筆紀錄？")) {
            let db = JSON.parse(localStorage.getItem('db_v3')) || [];
            db = db.filter(r => r.id !== id);
            localStorage.setItem('db_v3', JSON.stringify(db));
            renderUI();
        }
    }

    // 6. 渲染畫面 (看板、長條圖、列表)
    function renderUI() {
        const db = JSON.parse(localStorage.getItem('db_v3')) || [];
        
        // 計算運氣平均
        const calcOverall = (filter) => {
            const items = db.filter(r => r.main === filter && r.res === 'target'); 
            if (!items.length) return "---";
            const avg = items.reduce((a,b) => a + b.luck.s, 0) / items.length;
            if (avg >= 1.5) return '<span class="title-god">天選之子</span>';
            if (avg >= 0.5) return '<span class="title-lucky">幸運兒</span>';
            if (avg >= -0.5) return '<span class="title-plain">平凡人</span>';
            if (avg >= -1.5) return '<span class="title-unlucky">小不幸運</span>';
            return '<span class="title-bad">小倒霉鬼</span>';
        };
        document.getElementById('luckLim').innerHTML = `<h5>💠 限時池運氣</h5>${calcOverall('限定')}`;
        document.getElementById('luckRe').innerHTML = `<h5>🔄 復刻池運氣</h5>${calcOverall('復刻')}`;

        // 找最歐卡池
        const targets = db.filter(r => r.res === 'target');
        if(targets.length > 0){
            const best = targets.sort((a,b) => a.total - b.total)[0];
            document.getElementById('bestBanner').innerHTML = `<h5>🏆 最歐卡池</h5><span style="font-size:13px; font-weight:bold;">${best.banner} (${best.total}抽)</span>`;
        } else {
            document.getElementById('bestBanner').innerHTML = `<h5>🏆 最歐卡池</h5>---`;
        }

        // 找最常歪誰
        const waiRecords = db.filter(r => r.res === 'wai');
        if (waiRecords.length > 0) {
            let counts = {};
            waiRecords.forEach(r => counts[r.lead] = (counts[r.lead] || 0) + 1);
            let topWai = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            document.getElementById('worstSpook').innerHTML = `<h5>💔 最常歪誰</h5><span style="font-size:13px; font-weight:bold;">${leadIcons[topWai]}${topWai} (${counts[topWai]}次)</span>`;
        } else {
            document.getElementById('worstSpook').innerHTML = `<h5>💔 最常歪誰</h5>---`;
        }

        // 繪製長條圖
        const chart = document.getElementById('chartContainer');
        chart.innerHTML = '';
        [...db].reverse().forEach(r => {
            const h = (r.pulls / 70) * 100;
            const wrap = document.createElement('div'); wrap.className = 'bar-wrapper';
            
            let iconStr = '🎯'; let circleClass = 'circle-target';
            if(r.res === 'wai') { iconStr = '💔'; circleClass = 'circle-wai'; }
            if(r.res === 'oshi_spook') { iconStr = '💖'; circleClass = 'circle-oshi'; } 
            
            wrap.innerHTML = `<div class="wai-circle ${circleClass}">${iconStr}</div>
                              <div class="bar-value">${r.pulls}</div>
                              <div class="bar-fill" style="height:${h}%; background:${r.luck.c}"></div>
                              <div class="bar-label" title="${r.banner}">${r.banner.substring(0,3)}..</div>`;
            chart.appendChild(wrap);
        });

        // 歷史清單
        document.getElementById('recordList').innerHTML = db.map(r => {
            let statusText = '當期 UP'; let tagClass = 'tag-target';
            if(r.res === 'wai') { statusText = '歪卡'; tagClass = 'tag-wai'; }
            if(r.res === 'oshi_spook') { statusText = '歪自推'; tagClass = 'tag-oshi'; }
            
            const leadStr = `${leadIcons[r.lead]} ${r.lead}`;
            const cardDisplay = r.card ? ` | ${r.card}` : '';

            return `
            <div class="record-card">
                <div class="record-info">
                    <h4><span class="tag ${tagClass}">${statusText}</span> ${r.banner}</h4>
                    <p>${leadStr}${cardDisplay} | <b>${r.pulls}抽</b> ${r.res==='target' ? '(含墊池 '+r.total+' 抽)' : ''}</p>
                </div>
                <div style="text-align:right;">
                    <span style="color:${r.luck.c}; font-weight:bold; font-size:14px;">${r.luck.t}</span>
                    <button class="del-btn" onclick="deleteRec(${r.id})">刪除</button>
                </div>
            </div>
            `;
        }).join('');
    }

    function clearAll() { 
        if(confirm("確定清空所有資料？此操作無法復原。")) { 
            localStorage.removeItem('db_v3'); 
            localStorage.removeItem('p_lim'); 
            localStorage.removeItem('p_re'); 
            renderUI(); 
        } 
    }
    
    // 初始化啟動
    loadOshis();
    initEventData();
    renderUI();
</script>
</body>
</html>
