<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戀與深空 | 抽卡紀錄分析器</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XFHS7XLB0X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XFHS7XLB0X');
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
</head>
<body>

<div class="container">
    <div class="header-section">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
        <h1>✨ 抽卡紀錄分析器</h1>
        <p class="subtitle">抽卡體質鑑定🙌</p>
    </div>

    <div class="main-layout">
        
        <div class="left-col">
            <div class="oshi-box">
                <div class="oshi-header">
                    <label id="oshiSummary">💖 主推守護中：</label>
                    <button id="oshiToggleBtn" onclick="toggleOshiEdit()" style="background:none; border:none; color:var(--oshi-color); font-size:12px; cursor:pointer; padding:0; font-weight:bold;">[設定]</button>
                </div>
                <div class="radio-group" id="oshiGroup" style="display: none; margin-top: 10px;">
                    <label class="radio-label oshi-label"><input type="checkbox" name="oshi" value="祁煜" onchange="saveOshis()"> 🐟 祁煜</label>
                    <label class="radio-label oshi-label"><input type="checkbox" name="oshi" value="沈星回" onchange="saveOshis()"> 🌟 沈星回</label>
                    <label class="radio-label oshi-label"><input type="checkbox" name="oshi" value="黎深" onchange="saveOshis()"> 🍐 黎深</label>
                    <label class="radio-label oshi-label"><input type="checkbox" name="oshi" value="秦徹" onchange="saveOshis()"> 🚘 秦徹</label>
                    <label class="radio-label oshi-label"><input type="checkbox" name="oshi" value="夏以晝" onchange="saveOshis()"> 🍎 夏以晝</label>
                </div>
            </div>

            <div class="form-group ocr-box">
                <label class="group-label" style="color: var(--title-color);">📸 自動輔助：上傳抽卡紀錄截圖</label>
                <div style="font-size: 12px; color: var(--text-sub); margin-bottom: 8px;">💡 建議每次上傳圖片數不超過 10 張</div>
                <input type="file" id="ocrInput" accept="image/*" multiple onchange="handleOCR(event)" style="padding: 5px 0; font-size: 13px; border: none; background: transparent; color: var(--text-sub);">
                <div id="ocrStatus" style="font-size: 12px; margin-top: 6px; font-weight: bold; color: var(--text-sub);">請上傳抽卡紀錄</div>
            </div>

            <div class="form-group">
                <label class="group-label">1. 卡池種類</label>
                <div style="display: flex; gap: 10px; margin-top: 4px;">
                    <div class="radio-group" style="margin-top: 0;">
                        <label class="radio-label"><input type="radio" name="mainPool" value="限定" checked onchange="onPoolChange()"> 💠 限定</label>
                        <label class="radio-label"><input type="radio" name="mainPool" value="復刻" onchange="onPoolChange()"> 🔄 復刻</label>
                        <label class="radio-label"><input type="radio" name="mainPool" value="常駐" onchange="onPoolChange()"> 🎫 常駐</label>
                    </div>
                    <div class="radio-group" style="margin-top: 0;" id="subPoolGroup">
                        <label class="radio-label"><input type="radio" name="subPool" value="單人" checked onchange="onPoolChange()"> 👤 單人</label>
                        <label class="radio-label"><input type="radio" name="subPool" value="日卡" onchange="onPoolChange()"> ☀️ 日卡</label>
                        <label class="radio-label"><input type="radio" name="subPool" value="混池" onchange="onPoolChange()"> 👥 混池</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="group-label">2. 卡池名稱與當期思念</label>
                <div style="display: flex; gap: 10px;">
                    <div class="autocomplete-wrapper">
                        <input type="text" id="bannerName" placeholder="點此選擇卡池" autocomplete="off" oninput="filterDropdown('bannerName')" onfocus="showDropdown('bannerName')" onblur="hideDropdownDelayed('bannerName')">
                        <div id="bannerNameListWrapper" class="autocomplete-list"></div>
                    </div>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="upCardName" placeholder="以卡名反查卡池 🔍" autocomplete="off" oninput="filterDropdown('upCardName')" onfocus="showDropdown('upCardName')" onblur="hideDropdownDelayed('upCardName')">
                        <div id="upCardNameListWrapper" class="autocomplete-list"></div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="group-label">3. 獲得對象與思念名稱</label>
                <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center;">
                    <div class="radio-group" style="margin-top: 0; margin-bottom: 0;">
                        <label class="radio-label"><input type="radio" name="pulledLead" value="祁煜" checked onchange="updatePulledCardList()"> 🐟</label>
                        <label class="radio-label"><input type="radio" name="pulledLead" value="沈星回" onchange="updatePulledCardList()"> 🌟</label>
                        <label class="radio-label"><input type="radio" name="pulledLead" value="黎深" onchange="updatePulledCardList()"> 🍐</label>
                        <label class="radio-label"><input type="radio" name="pulledLead" value="秦徹" onchange="updatePulledCardList()"> 🚘</label>
                        <label class="radio-label"><input type="radio" name="pulledLead" value="夏以晝" onchange="updatePulledCardList()"> 🍎</label>
                    </div>
                    <div class="autocomplete-wrapper" style="min-width: 140px;">
                        <input type="text" id="cardName" placeholder="思念名稱" autocomplete="off" oninput="filterDropdown('cardName')" onfocus="showDropdown('cardName')" onblur="hideDropdownDelayed('cardName')">
                        <div id="cardNameListWrapper" class="autocomplete-list"></div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="group-label">4. 花費抽數 (1~70)</label>
                <input type="number" id="pulls" placeholder="距離上次出金花費抽數" style="width: 100%;" min="1" max="70" onkeydown="if(event.key === 'Enter') addRecord()">
            </div>

            <button class="main-btn" onclick="addRecord()">新增紀錄 📝</button>
        </div>


        <div class="right-col">
            <div class="pending-board" style="margin-top: 0;">
                <div class="pending-item pending-lim" onclick="editPending('lim')">限定池必出UP ✏️<span id="pLim">140</span></div>
                <div class="pending-item" onclick="editPending('std')" style="color: #3b82f6; border-right: 1px solid var(--border);">常駐池必五星 ✏️<span id="pStd">70</span></div>
                <div class="pending-item pending-re" onclick="editPending('re')">復刻池必出UP ✏️<span id="pRe">140</span></div>
            </div>

            <div class="section-header" style="margin-top: 5px;">📈 抽卡數據統計</div>
            
            <div class="stats-board">
                <div class="stat-card">
                    <div class="stat-title">限定池</div>
                    <div class="stat-value"><span id="statLimPulls">0</span><span class="stat-unit">抽</span></div>
                    <div class="stat-diamonds" id="statLimDiamonds">(0 鑽)</div>
                    <div class="stat-luck" id="statLimLuck">---</div>
                    <div class="sub-stats">
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statLimCount">0/0</span><span class="sub-stat-label">UP/總五星</span></div>
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statLimAvg">0.0</span><span class="sub-stat-label">UP平均</span></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">常駐池</div>
                    <div class="stat-value"><span id="statStdPulls">0</span><span class="stat-unit">抽</span></div>
                    <div class="stat-diamonds" id="statStdDiamonds" style="visibility: hidden;">(0 鑽)</div>
                    <div class="stat-luck" id="statStdLuck">---</div>
                    <div class="sub-stats">
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statStdCount">0</span><span class="sub-stat-label">五星數</span></div>
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statStdAvg">0.0</span><span class="sub-stat-label">五星平均</span></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">復刻池</div>
                    <div class="stat-value"><span id="statRePulls">0</span><span class="stat-unit">抽</span></div>
                    <div class="stat-diamonds" id="statReDiamonds">(0 鑽)</div>
                    <div class="stat-luck" id="statReLuck">---</div>
                    <div class="sub-stats">
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statReCount">0/0</span><span class="sub-stat-label">UP/總五星</span></div>
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statReAvg">0.0</span><span class="sub-stat-label">UP平均</span></div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title" style="margin-bottom: 2px;">
                        <select id="statSubPoolSelect" class="card-select" onchange="updateLuckStats()">
                            <option value="單人">單人池</option>
                            <option value="日卡">日卡池</option>
                            <option value="混池">混池</option>
                        </select>
                    </div>
                    <div class="stat-value"><span id="statSubPulls">0</span><span class="stat-unit">抽</span></div>
                    <div class="stat-diamonds" id="statSubDiamonds">(0 鑽)</div>
                    <div class="stat-luck" id="statSubLuck">---</div>
                    <div class="sub-stats">
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statSubCount">0/0</span><span class="sub-stat-label">UP/總五星</span></div>
                        <div class="sub-stat-item"><span class="sub-stat-val" id="statSubAvg">0.0</span><span class="sub-stat-label">UP平均</span></div>
                    </div>
                </div>
            </div>

            <div class="section-header">🏆 巔峰榜</div>
            <div class="peak-board" id="peakBoard"></div>

            <div class="section-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    📊 抽卡紀錄與長條圖
                    <select id="recordFilterSelect" class="luck-select" style="margin-bottom: 0; padding: 2px 20px 2px 8px; width: auto; font-size: 13px; background-size: 12px;" onchange="renderUI()">
                        <option value="全部" selected>全部紀錄</option>
                        <option value="限定">限定池</option>
                        <option value="復刻">復刻池</option>
                        <option value="常駐">常駐池</option>
                    </select>
                </div>
                <button onclick="clearAll()" style="background:none; border:none; color:#ef4444; font-size:11px; cursor:pointer;">清空</button>
            </div>
            
            <div id="recordList"></div>
        </div>

    </div> 
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="love_and_deepspace_events.js"></script>
<script src="love_and_deepspace_standard.js"></script>
<script src="ocr_parser.js"></script>
<script src="luck_data.js"></script>
<script src="app.js"></script>

</body>
</html>
